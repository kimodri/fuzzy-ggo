<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fuzzy Graphics Controller</title>
<style>
  body { margin: 0; font-family: monospace; background: #1e1e1e; color: #ddd; }
  #app { display: flex; height: 100vh; }
  #left { width: 45%; padding: 12px; box-sizing: border-box; display: flex; flex-direction: column; }
  #right { width: 55%; padding: 12px; box-sizing: border-box; display: flex; align-items: center; justify-content: center; background: #111; }
  #controls { margin-bottom: 8px; }
  #controls input { width: 80px; background: #2b2b2b; color: #ddd; border: 1px solid #444; padding: 4px; font-family: monospace; }
  #controls button { background: #2b2b2b; color: #ddd; border: 1px solid #444; padding: 5px 12px; cursor: pointer; font-family: monospace; margin-left: 4px; }
  #controls button:hover { background: #3a3a3a; }
  #log { flex: 1; background: #111; border: 1px solid #333; padding: 8px; overflow-y: auto; white-space: pre-wrap; font-size: 12px; line-height: 1.35; margin: 0; }
  #view { background: #000; max-width: 100%; height: auto; border: 1px solid #333; }
  #status { margin-top: 6px; font-size: 12px; color: #888; }
</style>
</head>
<body>
<div id="app">
  <div id="left">
    <div id="controls">
      <label>Target FPS: <input id="target" type="number" value="60" min="1" max="100" step="1"></label>
      <button id="simulate">Simulate</button>
      <button id="stop">Stop</button>
    </div>
    <div id="status">FPS: <span id="fps">48.00</span> &nbsp; Error: <span id="err">0.00</span></div>
    <pre id="log"></pre>
  </div>
  <div id="right">
    <canvas id="view" width="400" height="250"></canvas>
  </div>
</div>

<script>
// ---- Fuzzy set definitions (mirror simulate.py) ----
const error_graph = {
  ne: [[-30, 1], [-15, 1], [0, 0], [80, 0]],
  ze: [[-2, 0], [0, 1], [2, 0]],
  se: [[0, 0], [10, 1], [25, 0]],
  me: [[15, 0], [35, 1], [55, 0]],
  le: [[-30, 0], [45, 0], [60, 1], [80, 1]],
};
const error_dot_graph = {
  if: [[-30, 1], [-15, 1], [-8, 0], [30, 0]],
  is: [[-12, 0], [-6, 1], [0, 0]],
  s:  [[-3, 0], [0, 1], [3, 0]],
  ws: [[0, 0], [6, 1], [12, 0]],
  wf: [[-30, 0], [8, 0], [15, 1], [30, 1]],
};
const output_graph = {
  hi:  [[-10, 1], [-8, 1], [-6, 0], [10, 0]],
  mi:  [[-8, 0], [-6, 1], [-3, 0]],
  si:  [[-5, 0], [-3, 1], [-1, 0]],
  nc:  [[-1, 0], [0, 1], [1, 0]],
  sl:  [[1, 0], [3, 1], [5, 0]],
  ml:  [[3, 0], [6, 1], [8, 0]],
  slo: [[-10, 0], [6, 0], [8, 1], [10, 1]],
};

const target_fps = 60;
const initial_fps = 48;

function get_slope(p1, p2) {
  const [x1, y1] = p1, [x2, y2] = p2;
  if (x2 - x1 === 0) throw new Error("Cannot calculate slope for vertical line.");
  return (y2 - y1) / (x2 - x1);
}
function get_intercept(p1, p2) {
  const [x1, y1] = p1;
  return y1 - get_slope(p1, p2) * x1;
}

function get_membership_error(e) {
  let ne, ze, se, me, le;

  // ne: Trap [(-30,1),(-15,1),(0,0),(80,0)]
  if (e <= -15) ne = 1;
  else if (e < 0) ne = get_slope([-15, 1], [0, 0]) * e + get_intercept([-15, 1], [0, 0]);
  else ne = 0;

  // ze: Tri [(-2,0),(0,1),(2,0)]
  if (e <= -2) ze = 0;
  else if (e < 0) ze = get_slope([-2, 0], [0, 1]) * e + get_intercept([-2, 0], [0, 1]);
  else if (e < 2) ze = get_slope([0, 1], [2, 0]) * e + get_intercept([0, 1], [2, 0]);
  else ze = 0;

  // se: Tri [(0,0),(10,1),(25,0)]
  if (e <= 0) se = 0;
  else if (e < 10) se = get_slope([0, 0], [10, 1]) * e + get_intercept([0, 0], [10, 1]);
  else if (e < 25) se = get_slope([10, 1], [25, 0]) * e + get_intercept([10, 1], [25, 0]);
  else se = 0;

  // me: Tri [(15,0),(35,1),(55,0)]
  if (e <= 15) me = 0;
  else if (e < 35) me = get_slope([15, 0], [35, 1]) * e + get_intercept([15, 0], [35, 1]);
  else if (e < 55) me = get_slope([35, 1], [55, 0]) * e + get_intercept([35, 1], [55, 0]);
  else me = 0;

  // le: Trap [(-30,0),(45,0),(60,1),(80,1)]
  if (e <= 45) le = 0;
  else if (e < 60) le = get_slope([45, 0], [60, 1]) * e + get_intercept([45, 0], [60, 1]);
  else le = 1;

  return { ne, ze, se, me, le };
}

function get_membership_error_dot(ed) {
  let impf, imps, s, ws, wf;

  // impf: Trap [(-30,1),(-15,1),(-8,0),(30,0)]
  if (ed <= -15) impf = 1;
  else if (ed < -8) impf = get_slope([-15, 1], [-8, 0]) * ed + get_intercept([-15, 1], [-8, 0]);
  else impf = 0;

  // imps: Tri [(-12,0),(-6,1),(0,0)]
  if (ed <= -12) imps = 0;
  else if (ed < -6) imps = get_slope([-12, 0], [-6, 1]) * ed + get_intercept([-12, 0], [-6, 1]);
  else if (ed < 0) imps = get_slope([-6, 1], [0, 0]) * ed + get_intercept([-6, 1], [0, 0]);
  else imps = 0;

  // s: Tri [(-3,0),(0,1),(3,0)]
  if (ed <= -3) s = 0;
  else if (ed < 0) s = get_slope([-3, 0], [0, 1]) * ed + get_intercept([-3, 0], [0, 1]);
  else if (ed < 3) s = get_slope([0, 1], [3, 0]) * ed + get_intercept([0, 1], [3, 0]);
  else s = 0;

  // ws: Tri [(0,0),(6,1),(12,0)]
  if (ed <= 0) ws = 0;
  else if (ed < 6) ws = get_slope([0, 0], [6, 1]) * ed + get_intercept([0, 0], [6, 1]);
  else if (ed < 12) ws = get_slope([6, 1], [12, 0]) * ed + get_intercept([6, 1], [12, 0]);
  else ws = 0;

  // wf: Trap [(-30,0),(8,0),(15,1),(30,1)]
  if (ed <= 8) wf = 0;
  else if (ed < 15) wf = get_slope([8, 0], [15, 1]) * ed + get_intercept([8, 0], [15, 1]);
  else wf = 1;

  return { impf, imps, s, ws, wf };
}

function get_membership_output(x) {
  let hi, mi, si, nc, sl, ml, slo;

  // hi: Trap [(-10,1),(-8,1),(-6,0),(10,0)]
  if (x <= -8) hi = 1;
  else if (x < -6) hi = get_slope([-8, 1], [-6, 0]) * x + get_intercept([-8, 1], [-6, 0]);
  else hi = 0;

  // mi: Tri [(-8,0),(-6,1),(-3,0)]
  if (x <= -8) mi = 0;
  else if (x < -6) mi = get_slope([-8, 0], [-6, 1]) * x + get_intercept([-8, 0], [-6, 1]);
  else if (x < -3) mi = get_slope([-6, 1], [-3, 0]) * x + get_intercept([-6, 1], [-3, 0]);
  else mi = 0;

  // si: Tri [(-5,0),(-3,1),(-1,0)]
  if (x <= -5) si = 0;
  else if (x < -3) si = get_slope([-5, 0], [-3, 1]) * x + get_intercept([-5, 0], [-3, 1]);
  else if (x < -1) si = get_slope([-3, 1], [-1, 0]) * x + get_intercept([-3, 1], [-1, 0]);
  else si = 0;

  // nc: Tri [(-1,0),(0,1),(1,0)]
  if (x <= -1) nc = 0;
  else if (x < 0) nc = get_slope([-1, 0], [0, 1]) * x + get_intercept([-1, 0], [0, 1]);
  else if (x < 1) nc = get_slope([0, 1], [1, 0]) * x + get_intercept([0, 1], [1, 0]);
  else nc = 0;

  // sl: Tri [(1,0),(3,1),(5,0)]
  if (x <= 1) sl = 0;
  else if (x < 3) sl = get_slope([1, 0], [3, 1]) * x + get_intercept([1, 0], [3, 1]);
  else if (x < 5) sl = get_slope([3, 1], [5, 0]) * x + get_intercept([3, 1], [5, 0]);
  else sl = 0;

  // ml: Tri [(3,0),(6,1),(8,0)]
  if (x <= 3) ml = 0;
  else if (x < 6) ml = get_slope([3, 0], [6, 1]) * x + get_intercept([3, 0], [6, 1]);
  else if (x < 8) ml = get_slope([6, 1], [8, 0]) * x + get_intercept([6, 1], [8, 0]);
  else ml = 0;

  // slo: Trap [(-10,0),(6,0),(8,1),(10,1)]
  if (x <= 6) slo = 0;
  else if (x < 8) slo = get_slope([6, 0], [8, 1]) * x + get_intercept([6, 0], [8, 1]);
  else slo = 1;

  return { hi, mi, si, nc, sl, ml, slo };
}

// ---- DOM + simulation state ----
const targetInput = document.getElementById('target');
const simulateBtn = document.getElementById('simulate');
const stopBtn     = document.getElementById('stop');
const logEl       = document.getElementById('log');
const fpsEl       = document.getElementById('fps');
const errEl       = document.getElementById('err');
const canvas      = document.getElementById('view');
const ctx         = canvas.getContext('2d');

const img = new Image();
img.src = 'src/josie.png';

let intervalId = null;
let current_fps, prev_error, tick, stable_ticks, target;

function log(line) {
  logEl.textContent += line + "\n";
  logEl.scrollTop = logEl.scrollHeight;
}

function fmt(n, d = 2, sign = false) {
  const s = n.toFixed(d);
  if (sign && n >= 0 && !s.startsWith('-')) return '+' + s;
  return s;
}

function drawImageWithBlur(blurPx) {
  ctx.save();
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.filter = `blur(${blurPx}px)`;
  if (img.complete && img.naturalWidth > 0) {
    // contain-fit
    const cw = canvas.width, ch = canvas.height;
    const ir = img.naturalWidth / img.naturalHeight;
    const cr = cw / ch;
    let dw, dh;
    if (ir > cr) { dw = cw; dh = cw / ir; }
    else { dh = ch; dw = ch * ir; }
    ctx.drawImage(img, (cw - dw) / 2, (ch - dh) / 2, dw, dh);
  } else {
    ctx.fillStyle = '#222';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }
  ctx.restore();
}

function updateCanvas(error) {
  const blurPx = Math.min(20, Math.abs(error) * 0.5);
  drawImageWithBlur(blurPx);
}

img.onload = () => updateCanvas(parseFloat(targetInput.value) - initial_fps);

function doTick() {
  const error = target - current_fps;
  const error_dot = error - prev_error;

  const { ne, ze, se, me, le } = get_membership_error(error);
  const { impf, imps, s, ws, wf } = get_membership_error_dot(error_dot);

  // Rule aggregation (mirrors simulate.py lines 340-353)
  const cap_hi = Math.min(ne, impf);                                                   // rule 1
  const cap_mi = Math.max(Math.min(ne, imps), Math.min(se, impf));                     // rules 2, 6
  const cap_si = Math.max(Math.min(ne, s), Math.min(se, imps), Math.min(me, impf));    // rules 3, 7, 11
  const cap_nc = Math.max(
    Math.min(ne, ws),                                                                  // rule 4
    Math.min(ze, impf), Math.min(ze, imps), Math.min(ze, s),
    Math.min(ze, ws), Math.min(ze, wf),                                                // rules 21-25
  );
  const cap_sl = Math.max(Math.min(ne, wf), Math.min(se, s), Math.min(me, imps), Math.min(le, impf)); // 5,8,12,16
  const cap_ml = Math.max(
    Math.min(se, ws), Math.min(se, wf),
    Math.min(me, s), Math.min(me, ws),
    Math.min(le, imps), Math.min(le, s),
  );                                                                                   // 9,10,13,14,17,18
  const cap_slo = Math.max(Math.min(me, wf), Math.min(le, ws), Math.min(le, wf));      // 15, 19, 20

  // Defuzzification — centroid over [-10, 10] step 0.1
  let sum_xy = 0, sum_y = 0;
  for (let i = -100; i <= 100; i++) {
    const x = i * 0.1;
    const m = get_membership_output(x);
    const y = Math.max(
      Math.min(m.hi,  cap_hi),
      Math.min(m.mi,  cap_mi),
      Math.min(m.si,  cap_si),
      Math.min(m.nc,  cap_nc),
      Math.min(m.sl,  cap_sl),
      Math.min(m.ml,  cap_ml),
      Math.min(m.slo, cap_slo),
    );
    sum_xy += x * y;
    sum_y  += y;
  }
  const z = sum_y !== 0 ? sum_xy / sum_y : 0;

  const caps = {
    "Strongly increase graphics":   cap_hi,
    "Moderately increase graphics": cap_mi,
    "Slightly increase graphics":   cap_si,
    "No change":                    cap_nc,
    "Slightly lower graphics":      cap_sl,
    "Moderately lower graphics":    cap_ml,
    "Strongly lower graphics":      cap_slo,
  };
  let action = "", best = -Infinity;
  for (const k in caps) if (caps[k] > best) { best = caps[k]; action = k; }

  // Log block (mirrors python print format)
  log(`\n== Tick ${tick} ==`);
  // log(`  Error memberships     : ne=${fmt(ne)}  ze=${fmt(ze)}  se=${fmt(se)}  me=${fmt(me)}  le=${fmt(le)}`);
  // log(`  Error Dot memberships : if=${fmt(impf)}  is=${fmt(imps)}  s=${fmt(s)}  ws=${fmt(ws)}  wf=${fmt(wf)}`);
  // log(`  Rule strengths        : hi=${fmt(cap_hi)}  mi=${fmt(cap_mi)}  si=${fmt(cap_si)}  nc=${fmt(cap_nc)}  sl=${fmt(cap_sl)}  ml=${fmt(cap_ml)}  slo=${fmt(cap_slo)}`);
  log(`  State                 : target=${fmt(target)}  current=${fmt(current_fps)}  error=${fmt(error, 2, true)}  error_dot=${fmt(error_dot, 2, true)}`);
  log(`  Defuzz output         : z=${fmt(z)}`);
  log(`  Action                : ${action}`);

  tick += 1;

  const prev_fps = current_fps;
  current_fps = Math.max(0, Math.min(100, current_fps + 0.4 * z));
  const delta = current_fps - prev_fps;
  log(`  Applied               : Δfps=${fmt(delta, 4, true)}  →  new fps=${fmt(current_fps)}`);

  fpsEl.textContent = fmt(current_fps);
  errEl.textContent = fmt(target - current_fps, 2, true);
  updateCanvas(target - current_fps);

  if (Math.abs(error) < 0.1) {
    stable_ticks += 1;
    if (stable_ticks >= 10) {
      log("Stabilized.");
      stopSim();
      return;
    }
  } else {
    stable_ticks = 0;
  }

  prev_error = error;
}

function startSim() {
  stopSim();
  target = parseFloat(targetInput.value);
  if (!isFinite(target)) { alert("Enter a valid target FPS."); return; }
  current_fps = initial_fps;
  prev_error = 0;
  tick = 0;
  stable_ticks = 0;
  logEl.textContent = "";
  log("-- Initial state --");
  log(`  Target FPS    : ${fmt(target)}`);
  log(`  Starting FPS  : ${fmt(current_fps)}`);
  fpsEl.textContent = fmt(current_fps);
  errEl.textContent = fmt(target - current_fps, 2, true);
  updateCanvas(target - current_fps);
  intervalId = setInterval(doTick, 1000);
}

function stopSim() {
  if (intervalId !== null) {
    clearInterval(intervalId);
    intervalId = null;
  }
}

simulateBtn.addEventListener('click', startSim);
stopBtn.addEventListener('click', () => { stopSim(); log("\n-- Stopped --"); });

// Initial paint before any simulation
updateCanvas(parseFloat(targetInput.value) - initial_fps);
</script>
</body>
</html>
